[tasks.generate]
description = "Trigger showcase generation on CI"
run = "gh workflow run generate.yml --repo 89jobrien/bazaar"

[tasks.sync]
description = "Trigger pages sync on CI"
run = "gh workflow run sync.yml --repo 89jobrien/89jobrien.github.io"

[tasks.build]
description = "Build bz release binary"
run = "cargo build --release -p bazaar-gen"

[tasks.bz]
description = "Generate showcase locally"
run = "GITHUB_TOKEN=$(gh auth token) BAZAAR_GITHUB_USER=89jobrien BAZAAR_CRATES_IO_USER=89jobrien ./target/release/bz --output-dir examples --readme examples/showcase.md --header-config examples/header.yaml --showcase-yaml examples/showcase.yaml"

[tasks.enrich]
description = "Enrich project descriptions, changelogs, categories via LLM"
run = "GITHUB_TOKEN=$(gh auth token) BAZAAR_GITHUB_USER=89jobrien BAZAAR_CRATES_IO_USER=89jobrien ./target/release/bz --enrich --output-dir examples --readme examples/showcase.md --header-config examples/header.yaml --showcase-yaml examples/showcase.yaml"

[tasks.deploy]
description = "Generate and deploy showcase to 89jobrien.github.io"
run = "GITHUB_TOKEN=$(gh auth token) BAZAAR_GITHUB_USER=89jobrien BAZAAR_CRATES_IO_USER=89jobrien ./target/release/bz --deploy --readme examples/showcase.md --header-config examples/header.yaml --showcase-yaml examples/showcase.yaml"

[tasks.watch]
description = "Watch mode: re-generate showcase every 5 minutes"
run = "GITHUB_TOKEN=$(gh auth token) BAZAAR_GITHUB_USER=89jobrien BAZAAR_CRATES_IO_USER=89jobrien ./target/release/bz --output-dir examples --readme examples/showcase.md --header-config examples/header.yaml --showcase-yaml examples/showcase.yaml --watch"
