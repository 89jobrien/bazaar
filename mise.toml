[tasks.generate]
description = "Trigger bazaar showcase generation workflow"
run = "gh workflow run generate.yml --repo 89jobrien/bazaar"

[tasks.sync]
description = "Trigger pages sync workflow"
run = "gh workflow run sync.yml --repo 89jobrien/89jobrien.github.io"

[tasks.generate-local]
description = "Generate showcase locally"
run = """
GITHUB_TOKEN=$(gh auth token) \
BAZAAR_GITHUB_USER=89jobrien \
BAZAAR_CRATES_IO_USER=89jobrien \
./target/release/bz --output index.html --readme README.md
"""

[tasks.build]
description = "Build bz release binary"
run = "cargo build --release -p bazaar-gen"

[tasks.deploy]
description = "Generate and deploy: run generate workflow then sync workflow"
run = [
  "gh workflow run generate.yml --repo 89jobrien/bazaar",
  "sleep 120",
  "gh workflow run sync.yml --repo 89jobrien/89jobrien.github.io",
]
