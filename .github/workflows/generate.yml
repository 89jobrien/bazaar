name: Generate showcase

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: ". -> target"

      - name: Preflight check
        env:
          BAZAAR_GITHUB_USER: ${{ vars.BAZAAR_GITHUB_USER }}
          BAZAAR_CRATES_IO_USER: ${{ vars.BAZAAR_CRATES_IO_USER }}
        run: |
          test -n "$BAZAAR_GITHUB_USER" || { echo ERROR: BAZAAR_GITHUB_USER not set >&2; exit 1; }
          test -n "$BAZAAR_CRATES_IO_USER" || { echo ERROR: BAZAAR_CRATES_IO_USER not set >&2; exit 1; }

      - name: Build bz
        run: cargo build --release -p bazaar-gen

      - name: Generate showcase
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BAZAAR_GITHUB_USER: ${{ vars.BAZAAR_GITHUB_USER }}
          BAZAAR_CRATES_IO_USER: ${{ vars.BAZAAR_CRATES_IO_USER }}
        run: ./target/release/bz --output index.html --readme README.md

      - name: Validate output
        run: |
          test -s index.html || { echo ERROR: index.html missing or empty >&2; exit 1; }
          test -s README.md || { echo ERROR: README.md missing or empty >&2; exit 1; }
          python3 -c 'import sys; d=open("index.html").read(); sys.exit(0 if "bazaar" in d else 1)' || { echo ERROR: index.html missing marker >&2; exit 1; }

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html README.md
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: regenerate showcase [skip ci]"
            git push
          fi
