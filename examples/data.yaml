    ## Installation

    ```bash
    claude plugin add github:89jobrien/atelier
    ```

    Requires `sanctum` for the session-start hook chain:

    ```bash
    claude plugin add github:89jobrien/sanctum
    ```

    For local repo development, use:

    ```bash
    cd ~/dev/atelier
    just init
    ```

