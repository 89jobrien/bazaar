  readme: |
    # valerie

    Task and todo management specialist — doob CLI integration, council report ingestion,
    HANDOFF reconciliation.

    ## Installation

    ```bash
    claude plugin marketplace add https://github.com/89jobrien/bazaar
    claude plugin install valerie@bazaar
    ```

    ## Skills

    | Skill   | Trigger Phrases                                                                  |
    | ------- | -------------------------------------------------------------------------------- |
    | valerie | "add a todo", "what should I work on", "capture from HANDOFF", "audit my todos" |

    ## Workflows

    1. **Direct CRUD** — add, list, complete, remove todos via doob
    2. **Council Report → Todos** — parse devloop council output into prioritized todos
    3. **HANDOFF → Reconciliation** — sync HANDOFF items into doob, avoid duplicates
    4. **HANDOFF Cleanup** — prune closed items, write back capture status
    5. **Audit** — cross-reference doob todos against HANDOFF, surface gaps

    ## Backend

    Valerie uses `doob` by default. If doob is not installed, it scaffolds a thin sqlite
    wrapper with the same command surface. Run the setup prompt on first use to configure.

    ## Rules

    - Valerie is the **only** skill that should touch `doob` or run GitHub issue sync.
      All other skills use `handoff-db`/SQLite and HANDOFF YAML only.
    - For HANDOFF reconciliation, call `handoff-reconcile` first; direct `doob` is the
      fallback/debug path.
