    # Dotfiles

    [![CI](https://github.com/89jobrien/dotfiles/actions/workflows/ci.yml/badge.svg)](https://github.com/89jobrien/dotfiles/actions/workflows/ci.yml)

    Reproducible dev environment bootstrap with a managed (immutable) core and local (mutable) overrides. Supports macOS, Linux, and Windows (via NixOS-WSL).

    ## Quick start

    **macOS / Linux:**

    ```bash
    pj dot install
    # or without pj:
    ALLOW_DIRECT_DOTFILES_INSTALL=1 ./install.sh
    ```

    **Windows** (elevated PowerShell):

    ```powershell
    Set-ExecutionPolicy Bypass -Scope Process -Force
    .\install.ps1
    ```

    Installs NixOS-WSL, native Windows dev tools via winget, then runs `nixos-rebuild switch` + `home-manager switch` inside NixOS. See [Windows bootstrap](#windows-nixos-wsl) for details.

    ### Task Runners

    Three equivalent interfaces for day-2 operations:
    - **Human workflow**: `mise run <task>` (interactive, colored output)
    - **AI/automation**: `just <recipe>` (scriptable, agent-friendly)
    - **Compatibility**: `make <target>` (legacy wrapper)

    All task definitions live in `.mise.toml`, `Justfile`, and `Makefile` respectively.

    ### Interactive Menu

    Quick-access TUI for exploring and running dotfiles commands:

    ```bash
    mise run menu      # Start interactive menu
    just menu          # Alternative via Just
    make menu          # Alternative via Make
    ```

    The menu provides guided navigation to:
    - **Scripts** - Run bootstrap, setup tools, configuration scripts
    - **Tasks** - Execute any mise task (doctor, drift, deploy, etc.)
    - **Documentation** - View CLAUDE.md, README, setup guides
    - **Repository** - Explore structure, list scripts, file statistics
    - **Git Operations** - Status, commits, branch management, create new branches
    - **Utilities** - Run doctor checks, drift detection, secret validation, hook verification

    Ideal for interactive exploration and quick task execution without memorizing commands.

    ### Testing & Validation

    ```bash
    mise run test              # run all tests
    mise run test-lib          # run library tests onl
