  readme: |-
    # tbh

    A command-line tool for running parallel agent experiments with automatic metric collection and statistical
    analysis.

    ## Overview

    tbh enables developers to objectively compare different approaches, configurations, or implementations by
    running controlled experiments and collecting quantitative evidence about performance, quality, and cost.

    ## Features

    - **Workspace Management**: Structured organization for experiment results
    - **Automatic Metric Collection**: Capture timing and token data from agent task notifications
    - **Statistical Analysis**: Mean, standard deviation, and delta calculations
    - **Comparison Reports**: Human-readable markdown reports with clear recommendations
    - **Programmatic Grading**: Evaluate outputs against custom assertions

    ## Installation

    ```bash
    go install ./cmd/tbh
    ```

    Or download pre-built binaries from the releases page.

    ## Quick Start

    ### Interactive Mode (Recommended)

    ```bash
    # 1. Initialize workspace (interactive prompts)
    tbh init

    # 2. Run your experiments (spawn agents manually)
    # ... agents run ...

    # 3. Record metrics (interactive selection)
    tbh record timing

    # 4. Generate benchmark
    tbh benchmark --workspace my-test/iteration-1

    # 5. View report
    cat my-test/iteration-1/benchmark.md
    ```

    ### Non-Interactive Mode

    ```bash
    # 1. Initialize workspace with flags
    tbh init my-test --configs baseline,optimized

    # 2. Run your experiments
    # ... agents run ...

    # 3. Record metrics with flags
    tbh record timing --run my-test/iteration-1/case-1/baseline --tokens 12500 --duration 15.2
    tbh record timing --run my-test/iteration-1/case-1/optimized --tokens 9800 --duration 11.8

    # 4. Generate benchmark
    tbh benchmark --workspace my-test/iteration-1

    # 5. View report
    cat my-test/iteration-1/benchmark.md
    ```

    ## Usage

    ### Interactive Mode

    tbh supports interactive mode for a user-friendly experience:

    **Initialize Workspace Interactively:**
    ```bash
    tbh init
    # or
    tbh init -i
    ```

    You'll be prompted for:
    - Test workspace name
    - Configura
